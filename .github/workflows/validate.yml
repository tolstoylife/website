name: Validate frontmatter

on:
  pull_request:
    branches: [main]
    paths:
      - "src/wiki/**/*.md"
      - "src/works/**/*.md"
  push:
    branches: [main]
    paths:
      - "src/wiki/**/*.md"
      - "src/works/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: node .github/scripts/validate-frontmatter.mjs
