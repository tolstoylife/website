# ── Bibliographic ────────────────────────────────────────────
dedicatedToEn: ""
dedicatedToRu: ""
epigraph: ""
epigraphAuthor: ""
epigraphSource: ""
themes:
  - "nonresistance to evil"
  - "Christian anarchism"
  - "pacifism"
  - "civil disobedience"
  - "critique of the state"
  - "critique of the church"
subjectHeadings:
  - "Christianity and politics"
  - "Nonviolence -- Religious aspects -- Christianity"
  - "Government, Resistance to -- Moral and ethical aspects"
  - "Anarchism"
synopsis: >
  A philosophical and religious treatise in which Tolstoy argues that true
  Christianity demands nonresistance to evil by force. He critiques the Russian
  Orthodox Church, the state, and military service as fundamentally incompatible
  with Christ's teachings. The work was a major influence on Gandhi's concept
  of nonviolent resistance (satyagraha).
bans:
  - banningAuthority: "Main Administration for Press Affairs (Главное управление по делам печати)"
    authorityType: "imperial-state"
    jurisdiction: "Russia"
    scope: "pre-publication-rejected"
    banDate: "1893"
    banDateOldStyle: "1893"
    banDateApproximate: true
    banLiftedDate: "1905"
    banLiftedDateOldStyle: "1905"
    banLiftedDateApproximate: true
    notes: >
      Rejected before publication. Russian copies circulated in samizdat and
      via Chertkov's Free Word Press (England). Legally published in Russia
      only after the October Manifesto (1905) relaxed censorship.
  - banningAuthority: "Holy Synod of the Russian Orthodox Church"
    authorityType: "holy-synod"
    jurisdiction: "Russia"
    scope: "complete-ban"
    banDate: ""
    banDateOldStyle: ""
    banDateApproximate: true
    banLiftedDate: ""
    banLiftedDateOldStyle: ""
    banLiftedDateApproximate: false
    notes: >
      Ecclesiastical suppression enforced independently of state censorship.
      The 1901 excommunication decree (February 24, 1901) intensified the
      church's opposition to this work specifically. Ban never formally lifted.
samizdatCirculation: true     # Circulated in handwritten copies and lithographed editions within Russia
excommunicationRelated: true  # Cited as a factor in the 1901 Holy Synod excommunication
censoredVersionExists: false  # Work was either banned entirely or published uncensored abroad; no known cut Russian edition
censoredVersionNotes: ""
censorshipNotes: >
  This work exemplifies Tolstoy's strategy of foreign-first publication to
  circumvent Imperial censorship. Civil censors and the Holy Synod acted
  independently but both suppressed the work. Chertkov's Free Word Press
  (England) distributed Russian-language copies that were smuggled back into
  Russia. The 1901 excommunication further cemented ecclesiastical opposition.
wordCount: 0    # needs verification
relatedWorks:
  - id: "what-i-believe"
    relationshipType: "companion"
  - id: "the-law-of-violence-and-the-law-of-love"
    relationshipType: "companion"
notes: >
  Highly influential on Mahatma Gandhi, who wrote to Tolstoy after reading it.
  This correspondence led to the Tolstoy-Gandhi letters (1909–1910).

